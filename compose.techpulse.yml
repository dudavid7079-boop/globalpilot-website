services:
  techpulse:
    image: caddy:2-alpine
    restart: unless-stopped
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    ports:
      - "${TECHPULSE_BIND:-127.0.0.1}:${TECHPULSE_PORT:-8103}:80"
    volumes:
      - ./youtube-ai-tech-aggregator:/srv/techpulse:ro
      - ./deploy/techpulse.Caddyfile:/etc/caddy/Caddyfile:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

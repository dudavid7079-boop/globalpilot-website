    <main>
      <section class="page-hero">
        <span class="section-label">Subscription Center</span>
        <h1>订阅每日科技快报</h1>
        <p>选择你关注的关键词和推送时间，TechPulse 会把海外科技与 AI 热点整理成中文摘要，方便每天快速浏览。</p>
      </section>

      <section class="subscription-layout">
        <form class="subscription-panel" id="subscriptionForm">
          <span class="section-label">Preferences</span>
          <label>
            <span>推送渠道</span>
            <select id="deliveryChannel">
              <option>Telegram Bot</option>
              <option>企业微信 API</option>
              <option>微信公众号模板消息</option>
              <option>Email Digest</option>
            </select>
          </label>
          <label>
            <span>关键词</span>
            <input id="keywordInput" type="text" value="OpenAI, MKBHD, AI Agents" />
          </label>
          <label>
            <span>推送时间</span>
            <select id="digestTime">
              <option>08:30 每日中文快报</option>
              <option>12:30 午间热榜更新</option>
              <option>20:30 晚间复盘</option>
            </select>
          </label>
          <button type="submit">保存订阅偏好</button>
          <p id="subscriptionNotice">保存后可在“我的账户”查看订阅偏好。</p>
        </form>

        <aside class="subscription-preview">
          <span class="section-label">Preview</span>
          <h2>明早你会收到什么</h2>
          <div id="digestPreview"></div>
        </aside>
      </section>
